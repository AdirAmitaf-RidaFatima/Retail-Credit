[theme]
base = "light"
primaryColor = "#2563eb"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#111827"
font = "sans serif"

[server]
maxUploadSize = 200
headless = true
enableXsrfProtection = true
enableCORS = true

[client]
showErrorDetails = true
toolbarMode = "viewer"

[browser]
gatherUsageStats = false
